
{% macro render_input(field, placeholder="") %}
<div class="mb-3">
    {{ field.label(class="form-label") }}
    {{ field(class="form-control", placeholder=placeholder) }}
    
    {% if field.errors %}
        {% for error in field.errors %}
            <div class="text-danger small">{{ error }}</div>
        {% endfor %}
    {% endif %}
</div>
{% endmacro %}
