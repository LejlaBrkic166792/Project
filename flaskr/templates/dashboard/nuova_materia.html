{% extends 'base.html' %}

{% block body %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Configura Nuova Materia</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Nome della Materia</label>
                            <input type="text" name="subject_name" class="form-control" placeholder="Es. Matematica" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label font-weight-bold">Carica il primo Report (CSV)</label>
                            <input type="file" name="file" class="form-control" accept=".csv" required>
                        </div>
                        
                        <div class="d-flex justify-content-between mt-4">
                            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-secondary">Annulla</a>
                            <button type="submit" class="btn btn-success">Crea Materia</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
