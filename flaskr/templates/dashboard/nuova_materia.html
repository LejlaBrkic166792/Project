{% extends 'dashboard/base_dash.html' %}

{% block body %}
<div class="form-container"> 
    <div class="card shadow">
        <div class="form-header">
            <h4 class="mb-0">Configura Nuova Materia</h4>
        </div>
        
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-3">
                    <label class="form-label font-bold">Nome della Materia</label>
                    <input type="text" name="subject_name" class="form-control" placeholder="Es. Matematica" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label font-bold">Carica il primo Report (CSV)</label>
                    <input type="file" name="file" class="form-control" accept=".csv" required>
                </div>
                
                <div class="form-footer"> <!-- Sostituisce d-flex justify-between mt-4 -->
                    <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-secondary">Annulla</a>
                    <button type="submit" class="btn btn-success">Crea Materia</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
